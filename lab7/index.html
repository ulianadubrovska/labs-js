<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Catalog</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
    <div class="container topbar-inner">
        <h1 class="logo">Food Catalog</h1>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="#" id="catalog-link">Catalog</a>
        </nav>
    </div>
</header>

<main class="container">
    <section class="hero">
        <h2>Welcome to our restaurant menu</h2>
        <p>
            This is a single-page web application that loads categories and menu
            items from JSON files using JavaScript and Ajax.
        </p>
    </section>

    <section id="content" class="content">
        <div class="home-message">
            <h3>Choose “Catalog” to load menu categories</h3>
            <p>
                Categories and products will be loaded dynamically without reloading
                the page.
            </p>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
